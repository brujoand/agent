# Managed by `agent issue enable`. Thin caller of the shared reusable workflow —
# put logic changes in the reusable workflow, not here.
#
# Summoning the agent: an authorized human mentioning the agent (@<login>) on a
# thread that does NOT yet carry the `agent` label adds that label (which is what
# actually starts the agent). The mention + authorization guard, and adding the
# label with the App token (so the `labeled` event re-triggers downstream
# workflows), all live in the reusable workflow.
name: Agent label on mention

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened]

concurrency:
  group: agent-label-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  add-label:
    uses: "{reusable_repo}/.github/workflows/agent-label.reusable.yml@{ref}"
    secrets: inherit
    with:
      mention: "@{bot_login}"
