# Managed by `agent issue enable`. Thin caller of the shared reusable workflow —
# put logic changes in the reusable workflow, not here.
#
# Cold-start / timeout-recovery: on an `agent`-labelled issue, any authorized
# human comment re-runs the wrapper, which resumes the persisted session and
# continues. The authorization guard lives in the reusable workflow.
name: Issue agent resume

on:
  issue_comment:
    types: [created]

concurrency:
  group: issue-agent-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  resume:
    uses: "{reusable_repo}/.github/workflows/issue-resume.reusable.yml@{ref}"
    secrets: inherit
    with:
      bot_login: {bot_login}
