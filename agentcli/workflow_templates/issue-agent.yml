# Managed by `agent issue enable`. Thin caller of the shared reusable workflow —
# put logic changes in the reusable workflow, not here.
#
# Trigger on `labeled` only, NOT `opened`: the `agent` label is the hand-off
# signal, and GitHub fires a `labeled` event even when an issue is opened with the
# label already applied, so `labeled` alone covers both paths exactly once.
name: Issue agent

on:
  issues:
    types: [labeled]

concurrency:
  # Shared with issue-resume so triage and resume never run concurrently on the
  # same issue. cancel-in-progress:false so a live session is not killed by a
  # later comment/label event.
  group: issue-agent-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage-and-fix:
    # Cheap gate here so no runner spins on non-agent labels; the heavier
    # authorization guards live in the reusable workflow.
    if: github.event.label.name == 'agent'
    uses: "{reusable_repo}/.github/workflows/issue-agent.reusable.yml@{ref}"
    secrets: inherit
    with:
      bot_login: {bot_login}
