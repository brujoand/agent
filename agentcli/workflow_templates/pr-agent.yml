# Managed by `agent issue enable`. Thin caller of the shared reusable workflow
# in brujoand/agent — put logic changes in the reusable workflow there, not here.
#
# Interactive, persistent agent for PULL REQUESTS. On an `agent`-labelled PR, any
# human comment starts or resumes a live PR-scoped session (TARGET_KIND=pr). The
# authorization + is-a-PR guards live in the reusable workflow.
name: Claude PR agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: pr-agent-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  respond:
    uses: brujoand/agent/.github/workflows/pr-agent.reusable.yml@{ref}
    secrets: inherit
