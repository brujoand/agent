name: PR review (reusable)

# Reusable one-shot PR verification. Called from a `pull_request` caller. Reads a
# PR against its intent (the linked issue + description) plus quality/security and
# posts ONE review comment. Never approves/blocks — a human merges.
#
# Opt-OUT: reviews every non-draft PR EXCEPT those carrying an `auto-merge` label
# (tag the PRs you are auto-merging so they skip review; everything else is
# reviewed by default). A consumer that wants tailored criteria overrides
# `review_prompt`, or drops repo conventions in CLAUDE.md / .claude/ (which the
# reviewer reads). Repo-specific review flavours (e.g. a rendered-manifest diff)
# stay in that repo's own workflow rather than here.
#
# HOSTED: this runs on a stock runner (default ubuntu-latest) with no custom
# image and no GitHub App — claude-code-action bootstraps Claude Code itself, and
# the review comment is posted with the job's own GITHUB_TOKEN. So a repo needs
# only the CLAUDE_CODE_OAUTH_TOKEN secret; there is no cluster/App dependency.
# (This is the per-repo half of the split: PR review stays per-repo, while ISSUES
# are handled by the central hub in the maintainer's infra.)

on:
  workflow_call:
    inputs:
      model:
        type: string
        required: false
        default: claude-opus-4-8
      runner:
        description: runs-on label for the review job.
        type: string
        required: false
        default: ubuntu-latest
      allowed_bots:
        description: >-
          claude-code-action allowed_bots. Opt-out reviews bot-authored PRs too
          (unless auto-merge-labelled) and the action refuses non-human actors
          unless allow-listed, so the default allows all.
        type: string
        required: false
        default: "*"
      review_prompt:
        description: Extra, repo-specific review criteria appended to the base prompt.
        type: string
        required: false
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    # Opt-out: review every non-draft PR unless it carries an `auto-merge` label.
    if: >-
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'auto-merge')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Run PR review
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464 # v1.0.159
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The job's own GITHUB_TOKEN posts the review comment — no App needed on
          # a hosted runner. The comment is github-actions[bot]-authored, which is
          # fine for a one-shot review.
          github_token: ${{ github.token }}
          # Opt-out reviews bot-authored PRs too (unless auto-merge-labelled); the
          # action refuses non-human actors unless allow-listed, so default "*".
          allowed_bots: ${{ inputs.allowed_bots }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a one-shot verification reviewer. Do NOT hold a conversation,
            do NOT push commits, do NOT approve or request changes — post a single
            review comment. A human still merges.

            Answer two questions, in order:
              (1) Does the change actually DO what it is supposed to? Compare the
                  code against its stated INTENT — the linked issue and the PR
                  description.
              (2) Does it meet quality and security standards?

            Steps:
            1. Establish intent, then check the diff against it:
               - `gh pr view ${{ github.event.pull_request.number }}` — title +
                 description (the claimed change).
               - If the body says `Closes #<M>` (or Fixes/Resolves #<M>), read that
                 issue: `gh issue view <M> --comments` — the requirement the code
                 must satisfy. (Dependency-bump PRs have no linked issue; judge on
                 the description.)
               - `gh pr diff ${{ github.event.pull_request.number }}` — the change.
               Verify the diff fulfils the issue + description: called-for changes
               present, nothing half-done, no unrelated scope creep.
            2. Read CLAUDE.md and any `.claude/` conventions, then review against
               them — correctness, security, and the repo's own hard rules.
            ${{ inputs.review_prompt }}

            Post ONE PR comment with `gh pr comment`, formatted as:
            - A first line: `## Agent verification — <verified | comments | concerns>`.
            - One short line on intent: does it fulfil the linked issue + PR
              description? Name specific points it does / does NOT satisfy.
            - Then terse, prioritized bullets: `file:line — issue — suggested fix`.
              If all good, say so in one line. Advisory only; be specific and brief.
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 30
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(gh pr comment:*),Read,Glob,Grep"
          additional_permissions: |
            actions: read
